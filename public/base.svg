<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Platforma oval/círculo como chão -->
  <ellipse cx="50" cy="75" rx="45" ry="12" fill="url(#floorGradient)" filter="url(#shadow)" stroke="#666" stroke-width="1"/>

  <!-- Linha de profundidade para dar efeito 3D -->
  <ellipse cx="50" cy="75" rx="45" ry="12" fill="none" stroke="#888" stroke-width="0.5" stroke-opacity="0.5"/>
</svg>
